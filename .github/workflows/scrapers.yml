name: scrapers

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/scrapers.yml"
      - "jup-multiply.js"
      - "jup-usdc.js"
      - "kamino-usdc.js"
      - "loopscale-onre.js"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrapers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Run scrapers
        shell: bash
        run: |
          export SCRAPE_TIMESTAMP="$(date --utc +'%Y-%m-%dT%H:%M:%S.%3NZ')"
          scrapers=(
            jup-multiply.js
            jup-usdc.js
            kamino-usdc.js
            loopscale-onre.js
          )
          pids=()

          for scraper in "${scrapers[@]}"; do
            node "$scraper" &
            pids+=("$!")
          done

          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit "$status"
      - name: Publish data
        shell: bash
        run: |
          files=(
            jup-ethena-usde-multiply.json
            jup-juiced-multiply.json
            jup-usdc.json
            kamino-usdc-main.json
            loopscale-onre-growth.json
            loopscale-usdc-onre.json
          )

          git add "${files[@]}" -f
          git commit -m "Update yield data"
          git fetch origin gh-pages
          git checkout gh-pages
          git checkout main -- "${files[@]}"
          git add "${files[@]}" -f
          git commit --amend --reset-author -m "Update data"
          git push --force-with-lease origin gh-pages
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
