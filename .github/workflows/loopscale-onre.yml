name: loopscale-onre

on:
  push:
    paths:
      - "loopscale-onre.js"
  schedule:
    - cron: "* * * * *"

jobs:
  loopscale-onre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ hashFiles('**/package-lock.json') }}

      - run: npm i
      - run: node loopscale-onre.js
      - run: |
          git add loopscale-usdc-onre.json loopscale-onre-growth.json -f
          git commit -m "Update Loopscale OnRe data"
          git fetch --all
          git checkout gh-pages
          git checkout main loopscale-usdc-onre.json loopscale-onre-growth.json
          git add loopscale-usdc-onre.json loopscale-onre-growth.json -f
          git commit --amend --reset-author -m "Update data"
          git push --force
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
